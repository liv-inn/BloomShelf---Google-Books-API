<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Shelf</title>
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="shortcut icon" href="./assets/imgs/favicon.png" type="image/x-icon">
</head>
<body>

    <nav>
        <img src="./assets/imgs/favicon.png" alt="Icon">
        <h1>Bloom Shelf</h1>
    </nav>
    
    <section class="search-bar">
        <h2>Bloom Shelf</h2>
        <h3>Procurar livros</h3>
        <form id="searchForm" action="/search" method="get">
            <input type="text" name="search" placeholder="Pesquisar...">
            <button type="submit">Buscar</button>
        </form>
    </section>

    <main>
       <section class="myList">
        <div></div>
        <p>Minha lista</p>
        <div></div>
       </section>

       <section class="pages">
        <a href="./pages/to-read.html"><button>Para Ler</button></a>
        <a href="./pages/favs.html"><button>Favoritos</button></a>
        <a href="./pages/read.html"><button>Lidos</button></a>
        <button id="recomendations">Recomendações</button>
       </section>

       <section class="resultSearch">
        <div id="results"></div>
       <div id="resultado"></div>
       </section>
    </main>

    <script src="./assets/js/index.js"></script>
    <script>
        
        function createFavoriteButton(bookCard, title, authors, imageLinks) {
            const bttnFavorite = document.createElement('button');
            bttnFavorite.classList.add('favorite-button');
            bttnFavorite.innerHTML = '<img src="./assets/imgs/favoritar.png" alt="Favoritar" />'; 
            bookCard.appendChild(bttnFavorite);

            const myFavList = JSON.parse(localStorage.getItem('myFavList')) || [];
            bttnFavorite.addEventListener('click', function() {
                const bookFavorite = myFavList.some(item => item.title === title);
                
                if (bookFavorite) {
                    alert('Este livro já está na lista de favoritos.');
                } else {
                    myFavList.push({ title, authors, imageLinks });
                    localStorage.setItem('myFavList', JSON.stringify(myFavList));
                    bttnFavorite.innerHTML = '<img src="./assets/imgs/favoritado.png" alt="Favoritado" />'; 
                }
            });
        }


    </script>
</body>
</html>
